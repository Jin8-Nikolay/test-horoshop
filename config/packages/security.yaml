security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # root inherits every right a plain user has, plus its own (e.g. DELETE).
    # Roles are kept in sync with App\Security\Role via !php/const.
    role_hierarchy:
        !php/const App\Security\Role::ROOT: [!php/const App\Security\Role::USER]

    # Required by the firewall config; the stateless authenticator resolves users
    # itself (via ApiToken), so this provider is not actually invoked.
    providers:
        api_users:
            entity:
                class: App\Entity\User
                property: login

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api:
            pattern: ^/
            stateless: true
            provider: api_users
            custom_authenticators:
                - App\Security\TokenAuthenticator
            entry_point: App\Security\ApiEntryPoint
            access_denied_handler: App\Security\AccessDeniedHandler

    access_control:
        - { path: '^/%app.api_version%/api', roles: IS_AUTHENTICATED_FULLY }
