services:
    db:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: user_api
            MYSQL_USER: app
            MYSQL_PASSWORD: app
        ports:
            - "3306:3306"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
            interval: 5s
            timeout: 3s
            retries: 20

    php:
        build: .
        depends_on:
            db:
                condition: service_healthy
        environment:
            APP_ENV: dev
            APP_SECRET: please_change_this_in_prod
            ROOT_API_TOKEN: root-secret-token
            DATABASE_URL: "mysql://app:app@db:3306/user_api?serverVersion=8.0&charset=utf8mb4"
        ports:
            - "8000:8000"
